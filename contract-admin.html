<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>전자근로계약 통합관리</title>
  <link rel="stylesheet" href="contract-admin.css" />
</head>

<body>
  <div class="container">

    <header>
      <h1>전자근로계약 통합관리</h1>
      <p>THE BIG KOREA HR SYSTEM</p>
    </header>

    <div class="header-buttons">
  <a class="ledger-btn"
     href="https://docs.google.com/spreadsheets/d/112xBTK2vY-LygksJ1Ia3nVCw9-Edue69q67nR5CS460/edit?gid=1011221428#gid=1011221428"
     target="_blank">
     📋 전자계약관리대장
  </a>
</div>

    <section class="stats">
      <div>
        <strong id="totalCount">0</strong>
        <span>전체 계약</span>
      </div>
      <div>
        <strong id="waitCount">0</strong>
        <span>서명대기</span>
      </div>
      <div>
        <strong id="doneCount">0</strong>
        <span>서명완료</span>
      </div>
      <div>
        <strong id="monthCount">0</strong>
        <span>금월 생성</span>
      </div>
    </section>

    <section class="search-box">
      <input type="text" id="searchName" placeholder="직원명 검색" />

      <select id="workplaceFilter">
        <option value="all">전체 사업장</option>
        <option value="더큰코리아 본사">더큰코리아 본사</option>
        <option value="한국의집 잠실롯데월드몰">한국의집 잠실롯데월드몰</option>
        <option value="길채정 압구정">길채정 압구정</option>
        <option value="평촌 소바공방">평촌 소바공방</option>
      </select>

      <select id="statusFilter">
        <option value="all">전체 상태</option>
        <option value="서명대기">서명대기</option>
        <option value="서명완료">서명완료</option>
      </select>

      <select id="typeFilter">
        <option value="all">전체 계약</option>
        <option value="정규직">정규직</option>
        <option value="아르바이트">아르바이트</option>
        <option value="용역">용역</option>
      </select>

      <button onclick="searchContracts()">조회</button>
      <button onclick="resetSearch()" class="gray">초기화</button>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>계약번호</th>
            <th>사업장</th>
            <th>계약종류</th>
            <th>상태</th>
            <th>직원명</th>
            <th>연락처</th>
            <th>입사일</th>
            <th>생성일시</th>
            <th>서명일시</th>
            <th>관리</th>
          </tr>
        </thead>

        <tbody id="contractTableBody">
          <tr>
            <td colspan="10">계약 목록을 불러오는 중입니다...</td>
          </tr>
        </tbody>
      </table>
    </section>

  </div>

  <div id="modal" class="modal">
    <div class="modal-content">

      <div class="modal-header">
        <h2>전자근로계약 원본 보기</h2>
        <button onclick="closeModal()">닫기</button>
      </div>

      <div id="contractDetail" class="contract-detail"></div>

      <div class="modal-buttons">
        <button onclick="printContract()">계약서 인쇄 / PDF 저장</button>
        <button onclick="copyWorkerLink()" class="green">직원 링크 복사</button>
      </div>

    </div>
  </div>

  <script src="contract-admin.js"></script>
</body>
</html>
