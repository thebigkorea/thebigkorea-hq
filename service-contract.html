<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사업소득자 용역계약서</title>
  <link rel="stylesheet" href="service-contract.css" />
</head>

<body>
  <div class="page">

    <header class="header">
      <h1>사업소득자 용역계약서</h1>
      <p>Service Provider Contract</p>
    </header>

    <main class="card">

      <section class="section">
        <h2>사업장 정보</h2>

        <div class="grid">
          <label>사업장 선택
            <select id="workplaceCode">
              <option value="hq">더큰코리아 본사</option>
              <option value="koreahouse_jamsil">한국의집 롯데월드몰점</option>
              <option value="gilchaejeong_apgujeong">길채정 압구정</option>
              <option value="sobagongbang_pyeongchon">평촌 소바공방</option>
              <option value="hyojonggaeng_paju">한국의집 효종갱 파주</option>
            </select>
          </label>

          <label>계약종류
            <input id="contractType" value="사업소득자 용역계약서" readonly />
          </label>
        </div>

        <div id="workplaceInfo" class="info-box"></div>
      </section>

            </section>

      
      <section class="section">
        <h2>용역 정보</h2>

      <section class="section">
        <h2>용역제공자 정보</h2>

        <div class="grid">
          <label>성명
            <input id="empName" placeholder="성명을 입력하세요" />
          </label>

          <label>주민등록번호
            <input id="residentNo" placeholder="예: 900101-1234567" maxlength="14" />
          </label>

          <label>생년월일
            <input id="birth" placeholder="주민번호 입력 시 자동 입력" readonly />
          </label>

          <label>연락처
            <input id="phone" placeholder="예: 010-0000-0000" />
          </label>

          <label class="full">주소
            <input id="address" placeholder="주소 입력" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>용역 정보</h2>

        <div class="grid">
          <label>계약 시작일
            <input id="startDate" type="date" />
          </label>

          <label>계약 종료일
            <input id="endDate" type="date" />
          </label>

          <label>용역장소
            <input id="workPlace" />
          </label>

          <label>용역내용
            <select id="jobDuty">
              <option value="">선택</option>
              <option value="홀 지원 용역">홀 지원 용역</option>
              <option value="주방 지원 용역">주방 지원 용역</option>
              <option value="조리 용역">조리 용역</option>
              <option value="행사 지원 용역">행사 지원 용역</option>
              <option value="매장 운영 지원 용역">매장 운영 지원 용역</option>
              <option value="기타">기타</option>
            </select>
          </label>

          <label id="jobDutyEtcWrap" style="display:none;">
            기타 용역내용
            <input id="jobDutyEtc" placeholder="용역내용 직접 입력" />
          </label>

          <label>지급기준
            <select id="payType">
              <option value="">선택</option>
              <option value="시간별">시간별</option>
              <option value="일별">일별</option>
              <option value="월별">월별</option>
              <option value="건별">건별</option>
            </select>
          </label>

          <label>용역비
            <input id="totalPay" class="money" placeholder="예: 2,000,000" />
          </label>

          <label>원천징수
            <select id="withholding">
              <option value="3.3% 원천징수 후 지급">3.3% 원천징수 후 지급</option>
              <option value="기타소득세 원천징수 후 지급">기타소득세 원천징수 후 지급</option>
              <option value="별도 협의">별도 협의</option>
            </select>
          </label>

          <label>지급일
            <input id="payDate" placeholder="예: 익월 10일" />
          </label>

          <label>지급은행
            <input id="bankName" placeholder="예: 국민은행" />
          </label>

          <label>계좌번호
            <input id="bankAccount" placeholder="예: 816901-04-112155" />
          </label>
        </div>
      </section>

      <div class="buttons">
        <button class="blue" onclick="makePreview()">사업소득자 용역계약서 생성</button>
        <button class="green" id="saveBtn" onclick="saveContract()">계약 저장 및 직원 링크 생성</button>
      </div>

      <section class="section preview-section">
        <h2>계약서 미리보기</h2>
        <div id="preview" class="preview"></div>
      </section>

      <div id="resultBox" class="result-box" style="display:none;"></div>

    </main>
  </div>

  <script src="service-contract.js"></script>
</body>
</html>
