<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매장점검 입력</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial,sans-serif;
      background:#f5efe6;
      color:#241812;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:28px 18px;
    }

    .header{
      background:#4a2616;
      color:#fff;
      padding:28px 22px;
      border-radius:0 0 28px 28px;
      margin-bottom:24px;
    }

    .header h1{
      margin:0;
      font-size:28px;
    }

    .header p{
      margin:8px 0 0;
      color:rgba(255,255,255,.75);
    }

    .card{
      background:#fff;
      border-radius:24px;
      padding:24px;
      box-shadow:0 10px 26px rgba(60,38,20,.08);
      border:1px solid #eadfce;
    }

    label{
      display:block;
      font-weight:800;
      margin:18px 0 8px;
    }

    input, select, textarea{
      width:100%;
      padding:15px 14px;
      border:1px solid #ddd3c5;
      border-radius:14px;
      font-size:16px;
      box-sizing:border-box;
      font-family:inherit;
    }

    textarea{
      min-height:150px;
      resize:vertical;
    }

    button{
      width:100%;
      margin-top:24px;
      padding:17px;
      border:0;
      border-radius:16px;
      background:#8b572a;
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .msg{
      margin-top:16px;
      font-weight:800;
      text-align:center;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>매장점검 입력</h1>
    <p>매장 운영 중 특이사항, 위생, 설비, 고객 컴플레인을 기록합니다.</p>
  </div>

  <div class="wrap">
    <div class="card">

      <label>점포명</label>
      <select id="storeName">
        <option value="">선택</option>
        <option value="한국의집 잠실">한국의집 잠실</option>
        <option value="길채정 압구정">길채정 압구정</option>
        <option value="소바공방 평촌">소바공방 평촌</option>
      </select>

      <label>브랜드</label>
      <select id="brand">
        <option value="">선택</option>
        <option value="한국의집">한국의집</option>
        <option value="길채정">길채정</option>
        <option value="소바공방">소바공방</option>
      </select>

      <label>작성자</label>
      <input id="writer" type="text" placeholder="예: 점장 홍길동">

      <label>점검구분</label>
      <select id="category">
        <option value="">선택</option>
        <option value="일일보고">일일보고</option>
        <option value="직원관리">직원관리</option>
        <option value="고객관리">고객관리</option>
        <option value="설비관리">설비관리</option>
        <option value="위생점검">위생점검</option>
        <option value="컴플레인">컴플레인</option>
        <option value="기타">기타</option>
      </select>

      <label>긴급도</label>
      <select id="priority">
        <option value="일반">일반</option>
        <option value="중요">중요</option>
        <option value="긴급">긴급</option>
      </select>

      <label>주요내용</label>
      <textarea id="content" placeholder="점검 내용 또는 본사에 공유할 내용을 입력하세요."></textarea>

      <label>첨부사진 링크</label>
      <input id="photo" type="text" placeholder="사진이 있으면 구글드라이브 링크 입력">

      <button id="saveBtn" onclick="saveCheck()">저장하기</button>

      <div id="msg" class="msg"></div>

    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1RoQvXt51KjoasIG-_MmD7SiMau10eRWAYiq4Vk1k2s9yRVsuEBrBVEFvmW7aX765/exec";

async function saveCheck(){
  const btn = document.getElementById("saveBtn");
  const msg = document.getElementById("msg");

  const data = {
    storeName: document.getElementById("storeName").value,
    brand: document.getElementById("brand").value,
    writer: document.getElementById("writer").value.trim(),
    category: document.getElementById("category").value,
    priority: document.getElementById("priority").value,
    content: document.getElementById("content").value.trim(),
    photo: document.getElementById("photo").value.trim()
  };

  if(!data.storeName || !data.brand || !data.writer || !data.category || !data.content){
    msg.style.color = "#b00020";
    msg.textContent = "필수 항목을 입력하세요.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "저장중...";
  msg.textContent = "";

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(result.success){
      msg.style.color = "#197857";
      msg.textContent = "저장되었습니다.";

      document.getElementById("writer").value = "";
      document.getElementById("content").value = "";
      document.getElementById("photo").value = "";
    }else{
      throw new Error(result.message || "저장 실패");
    }

  }catch(e){
    msg.style.color = "#b00020";
    msg.textContent = "저장 실패: " + e.message;
  }

  btn.disabled = false;
  btn.textContent = "저장하기";
}
</script>

</body>
</html>
