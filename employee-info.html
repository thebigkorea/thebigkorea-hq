<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>본사 직원정보 입력</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f4f6f9;
  font-family:'Malgun Gothic',Arial,sans-serif;
  color:#222;
}

.header{
  background:linear-gradient(135deg,#2b1d12,#7c2d12);
  color:#fff;
  padding:28px 18px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 5px 22px rgba(0,0,0,.18);
}

.header h1{margin:0;font-size:26px}
.header p{margin:8px 0 0;font-size:13px;opacity:.85}

.container{
  width:100%;
  max-width:820px;
  margin:0 auto;
  padding:18px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

h2{margin:0 0 16px;font-size:22px}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

label{
  display:block;
  font-size:14px;
  font-weight:bold;
}

input,select,textarea{
  width:100%;
  margin-top:6px;
  border:1px solid #d7dce5;
  border-radius:13px;
  padding:13px;
  font-size:15px;
  background:#fff;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.full{grid-column:1/-1}

button{
  width:100%;
  border:none;
  border-radius:15px;
  padding:15px;
  margin-top:16px;
  background:#7c2d12;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.notice{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:13px;
  font-size:14px;
}

.notice.ok{
  display:block;
  background:#dcfce7;
  color:#166534;
}

.notice.err{
  display:block;
  background:#fee2e2;
  color:#991b1b;
}

@media(max-width:760px){
  .form-grid{grid-template-columns:1fr}
  .header h1{font-size:23px}
}
</style>

<meta property="og:title" content="더큰코리아 직원정보 입력">
<meta property="og:description" content="직원정보를 휴대폰으로 간편하게 입력하세요.">
<meta property="og:image" content="https://thebigkorea.github.io/thebigkorea-hq/images/employee-info-link-image.png">
<meta property="og:url" content="https://thebigkorea.github.io/thebigkorea-hq/employee-info.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

</head>

<body>

<header class="header">
  <h1>더큰코리아 직원정보 입력</h1>
  <p>입력한 직원정보는 더큰코리아 인사관리대장에 저장됩니다.</p>
</header>

<main class="container">

  <section class="card">
    <h2>직원정보 입력</h2>

    <div class="form-grid">

      <label>
        소속
        <select id="workplace">
          <option value="주식회사 더큰코리아 본사">주식회사 더큰코리아 본사</option>
          <option value="한국의집 롯데월드몰점">한국의집 롯데월드몰점</option>
          <option value="소바공방 평촌점">소바공방 평촌점</option>
          <option value="길채정 압구정점">길채정 압구정점</option>
          <option value="한국의집 효종갱 파주">한국의집 효종갱 파주</option>
        </select>
      </label>

      <label>
        직원명
        <input id="name" type="text" placeholder="직원명" autocomplete="name">
      </label>

      <label>
        휴대폰
        <input id="phone" type="tel" inputmode="numeric" pattern="[0-9\-]*" maxlength="13" placeholder="010-0000-0000" autocomplete="tel">
      </label>

      <label>
        주민번호
        <input id="rrn" type="tel" inputmode="numeric" pattern="[0-9\-]*" maxlength="14" placeholder="000000-0000000" autocomplete="off">
      </label>

      <label>
        생년월일
        <input id="birth" type="date">
      </label>

      <label>
        입사일
        <input id="joinDate" type="date">
      </label>

      <label>
        퇴사일
        <input id="leaveDate" type="date">
      </label>

      <label>
        직위
        <input id="position" type="text" placeholder="예: 직원, 과장, 팀장">
      </label>

      <label>
        고용형태
        <select id="employmentType">
          <option value="">선택</option>
          <option value="정규직 근로계약서">정규직 근로계약서</option>
          <option value="계약직(아르바이트)">계약직(아르바이트)</option>
          <option value="사업소득자 용역계약서">사업소득자 용역계약서</option>
          <option value="일용직">일용직</option>
        </select>
      </label>

      <label>
        부서
        <select id="department">
          <option value="">선택</option>
          <option>본사</option>
          <option>관리</option>
          <option>회계</option>
          <option>인사</option>
          <option>영업관리</option>
          <option>운영관리</option>
          <option>홀</option>
          <option>주방</option>
          <option>설거지</option>
          <option>전처리</option>
        </select>
      </label>

      <label>
        상태
        <select id="status">
          <option>재직</option>
          <option>퇴사</option>
          <option>휴직</option>
        </select>
      </label>

      <label>
        은행명
        <input id="bank" type="text" placeholder="예: 국민은행">
      </label>

      <label>
        계좌번호
        <input id="account" type="tel" inputmode="numeric" pattern="[0-9\-]*" placeholder="계좌번호">
      </label>

      <label class="full">
        주소
        <input id="address" type="text" placeholder="주소">
      </label>

      <label class="full">
        비고
        <textarea id="memo" placeholder="특이사항"></textarea>
      </label>

    </div>

    <button id="saveBtn" onclick="saveEmployee()">직원정보 저장</button>

    <div id="saveNotice" class="notice"></div>
  </section>

</main>

<script>
const HQ_API_URL =
  "https://script.google.com/macros/s/AKfycbzkqmLXXU545mKYlGU8M4socvKJAB34DlzPVEWXurMOlogqtmRDR0rgVRsRWyye4wt6Kw/exec";

const phoneInput = document.getElementById("phone");
const rrnInput = document.getElementById("rrn");
const birthInput = document.getElementById("birth");

phoneInput.addEventListener("input", function(){
  this.value = formatPhone(this.value);
});

rrnInput.addEventListener("input", function(){
  this.value = formatRRN(this.value);
  setBirthFromRRN(this.value);
});

function val(id){
  return document.getElementById(id).value.trim();
}

function onlyNumber(value){
  return String(value || "").replace(/[^0-9]/g, "");
}

function formatPhone(value){
  const num = onlyNumber(value).slice(0,11);

  if(num.length <= 3){
    return num;
  }

  if(num.length <= 7){
    return num.replace(/(\d{3})(\d+)/, "$1-$2");
  }

  return num.replace(/(\d{3})(\d{4})(\d{0,4})/, "$1-$2-$3");
}

function formatRRN(value){
  const num = onlyNumber(value).slice(0,13);

  if(num.length <= 6){
    return num;
  }

  return num.replace(/(\d{6})(\d{0,7})/, "$1-$2");
}

function setBirthFromRRN(rrn){
  const num = onlyNumber(rrn);

  if(num.length < 6){
    birthInput.value = "";
    return;
  }

  const yy = Number(num.slice(0,2));
  const mm = num.slice(2,4);
  const dd = num.slice(4,6);
  const genderCode = num.slice(6,7);

  let century = "19";

  if(genderCode === "3" || genderCode === "4" || genderCode === "7" || genderCode === "8"){
    century = "20";
  }

  if(!genderCode){
    const currentYY = Number(String(new Date().getFullYear()).slice(2));
    century = yy <= currentYY ? "20" : "19";
  }

  const yyyy = century + String(yy).padStart(2,"0");
  const birth = `${yyyy}-${mm}-${dd}`;

  const d = new Date(birth);

  if(
    d instanceof Date &&
    !isNaN(d) &&
    String(d.getFullYear()) === yyyy &&
    String(d.getMonth() + 1).padStart(2,"0") === mm &&
    String(d.getDate()).padStart(2,"0") === dd
  ){
    birthInput.value = birth;
  }
}

function showNotice(type,msg){
  const el = document.getElementById("saveNotice");
  el.className = "notice " + type;
  el.textContent = msg;
}

function clearNotice(){
  const el = document.getElementById("saveNotice");
  el.className = "notice";
  el.textContent = "";
}

async function postJson(url,data){
  const res = await fetch(url,{
    method:"POST",
    body:JSON.stringify(data)
  });
  return await res.json();
}

async function saveEmployee(){
  clearNotice();

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "저장 중...";

  const workplace = val("workplace");
  const name = val("name");
  const phone = formatPhone(val("phone"));
  const rrn = formatRRN(val("rrn"));
  const rrnNumber = onlyNumber(rrn);

  if(!name){
    showNotice("err","직원명을 입력해주세요.");
    resetButton();
    return;
  }

  if(onlyNumber(phone).length < 10){
    showNotice("err","휴대폰 번호를 정확히 입력해주세요.");
    resetButton();
    return;
  }

  if(rrnNumber.length !== 13){
    showNotice("err","주민번호 13자리를 정확히 입력해주세요.");
    resetButton();
    return;
  }

  const commonData = {
    action:"saveEmployeeFromContract",

    workplace: workplace,
    workPlace: workplace,
    store: workplace,

    name: name,
    empName: name,
    phone: phone,

    rrn: rrn,
    residentNo: rrn,
    birth: val("birth"),

    address: val("address"),
    bank: val("bank"),
    account: val("account"),

    position: val("position"),
    employmentType: val("employmentType"),
    contractType: val("employmentType"),

    department: val("department"),
    status: val("status"),

    joinDate: val("joinDate"),
    startDate: val("joinDate"),
    leaveDate: val("leaveDate"),
    endDate: val("leaveDate"),

    memo: val("memo"),
    jobDuty: val("memo")
  };

  try{
    const result = await postJson(HQ_API_URL, commonData);

    if(!result.success){
      showNotice("err", result.message || "본사 인사관리대장 저장 실패");
      resetButton();
      return;
    }

    showNotice("ok", result.message || "본사 인사관리대장에 저장되었습니다.");
    clearForm();

  }catch(e){
    console.error(e);
    showNotice("err","저장 중 오류가 발생했습니다.");
  }

  resetButton();
}

function resetButton(){
  const btn = document.getElementById("saveBtn");
  btn.disabled = false;
  btn.textContent = "직원정보 저장";
}

function clearForm(){
  [
    "name","phone","rrn","birth","address","bank","account",
    "position","joinDate","leaveDate","memo"
  ].forEach(id => {
    document.getElementById(id).value = "";
  });

  document.getElementById("employmentType").value = "";
  document.getElementById("department").value = "";
  document.getElementById("status").value = "재직";
}
</script>

</body>
</html>
