<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>신규점포 개설관리</title>

<link rel="stylesheet" href="store-opening.css">
</head>

<body>

<header class="header">
  <h1>신규점포 개설관리</h1>
  <p>STORE OPENING PROJECT MANAGEMENT</p>
</header>

<main class="wrap">

  <section class="summary">
    <div class="summary-card">
      <strong id="totalProjects">0</strong>
      <span>전체 프로젝트</span>
    </div>

    <div class="summary-card">
      <strong id="openSoon">0</strong>
      <span>30일 이내 오픈</span>
    </div>

    <div class="summary-card">
      <strong id="avgProgress">0%</strong>
      <span>평균 진행률</span>
    </div>
  </section>

  <section class="tabs">
  <button class="tab active" onclick="showTab('list', this)">
    현황
  </button>

  <button class="tab" onclick="showTab('project', this)">
    점포등록
  </button>

  <button class="tab" onclick="showTab('task', this)">
    업무등록
  </button>

  <button class="tab" onclick="showTab('schedule', this)">
    일정표
  </button>

  <button class="tab" onclick="showTab('expenseSave', this)">
    출납내역 저장
  </button>

  <button class="tab" onclick="showTab('expenseLookup', this)">
    출납내역 조회
  </button>
</section>

  <section id="list" class="panel active">
    <h2>점포 개설 현황</h2>
    <div id="projectList" class="project-list"></div>
  </section>

  <section id="project" class="panel">

    <h2>신규점포 등록</h2>

    <div class="form-grid">

      <label>브랜드
        <select id="brand">
          <option>한국의집</option>
          <option>고호재</option>
          <option>효종갱</option>
          <option>길채정</option>
          <option>소바공방</option>
        </select>
      </label>

      <label>점포명
        <input type="text" id="storeName">
      </label>

      <label>유통사
        <input type="text" id="retailer">
      </label>

      <label>위치
        <input type="text" id="location">
      </label>

      <label>MD 담당자
        <input type="text" id="mdName">
      </label>

      <label>내부 담당자
        <input type="text" id="owner">
      </label>

      <label>계약예정일
        <input type="date" id="contractDate">
      </label>

      <label>공사시작일
        <input type="date" id="constructionStart">
      </label>

      <label>가오픈일
        <input type="date" id="preOpenDate">
      </label>

      <label>정식오픈일
        <input type="date" id="openDate">
      </label>

      <label>현재상태
        <select id="status">
          <option>검토중</option>
          <option>계약진행</option>
          <option>공사진행</option>
          <option>오픈준비</option>
          <option>오픈완료</option>
        </select>
      </label>

      <label>진행률(%)
        <input type="number" id="progress" value="0">
      </label>

    </div>

    <label class="full-label">
      메모
      <textarea id="projectMemo"></textarea>
    </label>

    <button class="primary" onclick="saveProject()">
      점포 프로젝트 저장
    </button>

  </section>

  <section id="task" class="panel">

    <h2>업무 등록</h2>

    <div class="form-grid">

      <label>점포 선택
        <select id="taskProjectId"></select>
      </label>

      <label>업무구분
        <select id="taskCategory">
          <option>계약</option>
          <option>도면</option>
          <option>공사</option>
          <option>집기/장비</option>
          <option>인허가</option>
          <option>채용</option>
          <option>교육</option>
        </select>
      </label>

      <label>업무명
        <input type="text" id="taskTitle">
      </label>

      <label>담당자
        <input type="text" id="taskOwner">
      </label>

      <label>시작일
        <input type="date" id="taskStartDate">
      </label>

      <label>마감일
        <input type="date" id="taskDueDate">
      </label>

      <label>상태
        <select id="taskStatus">
          <option>예정</option>
          <option>진행중</option>
          <option>완료</option>
        </select>
      </label>

    </div>

    <label class="full-label">
      메모
      <textarea id="taskMemo"></textarea>
    </label>

    <button class="primary" onclick="saveTask()">
      업무 저장
    </button>

  </section>

  <section id="schedule" class="panel">

    <h2>일정표</h2>

    <div class="form-grid">

      <label>조회월
        <input type="month" id="scheduleMonth">
      </label>

      <label>점포 선택
        <select id="scheduleProjectId"></select>
      </label>

    </div>

    <div id="scheduleList"></div>

  </section>

  <section id="expenseSave" class="panel">

  <h2>출납내역 저장</h2>

  <div class="form-grid">

    <label>
      점포 선택
      <select id="expenseProjectId"></select>
    </label>

    <label>
      지출일자
      <input type="date" id="expenseDate">
    </label>

    <label>
      비용구분
      <select id="expenseCategory">
        <option>계약금</option>
        <option>보증금</option>
        <option>권리금</option>
        <option>설계비</option>
        <option>공사비</option>
        <option>전기/가스/수도</option>
        <option>집기/장비</option>
        <option>POS/전산</option>
        <option>초도물품</option>
        <option>인허가/수수료</option>
        <option>교육비</option>
        <option>인건비</option>
        <option>교통/출장비</option>
        <option>기타</option>
      </select>
    </label>

    <label>
      거래처
      <input
        type="text"
        id="expenseVendor"
        placeholder="예: 인테리어 업체, 장비업체">
    </label>

    <label>
      지출금액
      <input
        type="text"
        id="expenseAmount"
        placeholder="예: 1,000,000">
    </label>

    <label>
      결제수단
      <select id="expensePayMethod">
        <option>계좌이체</option>
        <option>법인카드</option>
        <option>현금</option>
        <option>개인카드</option>
        <option>기타</option>
      </select>
    </label>

    <label>
      비용부담
      <select id="expenseShareType">
        <option>본사부담</option>
        <option>점포부담</option>
        <option>공동부담</option>
        <option>추후정산</option>
      </select>
    </label>

    <label>
      증빙여부
      <select id="expenseProof">
        <option>세금계산서</option>
        <option>카드영수증</option>
        <option>현금영수증</option>
        <option>간이영수증</option>
        <option>증빙없음</option>
      </select>
    </label>

  </div>

  <label class="full-label">
    메모
    <textarea
      id="expenseMemo"
      placeholder="비용 배분 기준, 정산 예정일, 특이사항"></textarea>
  </label>

  <button
    id="saveExpenseBtn"
    class="primary"
    onclick="saveExpense()">
    출납 내역 저장
  </button>

</section>


<section id="expenseLookup" class="panel">

  <h2>출납내역 조회</h2>

  <div class="expense-lookup-row">

    <label>
      점포 선택
      <select id="expenseLookupProjectId"></select>
    </label>

    <button
      id="loadExpenseBtn"
      class="primary"
      onclick="loadExpenses()">
      출납 내역 조회
    </button>

  </div>

  <div
    id="expenseSummary"
    class="summary"
    style="margin-top:24px; margin-bottom:20px;">

    <div class="summary-card">
      <strong id="expenseTotal">0원</strong>
      <span>총 지출액</span>
    </div>

    <div class="summary-card">
      <strong id="expenseHeadOffice">0원</strong>
      <span>본사부담</span>
    </div>

    <div class="summary-card">
      <strong id="expenseStore">0원</strong>
      <span>점포부담</span>
    </div>

  </div>

  <h2 class="expense-list-title">항목별 출납 내역</h2>

  <div id="expenseList" class="project-list"></div>

</section>

</main>

<script src="store-opening.js"></script>

</body>
</html>
