<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>신규점포 개설관리</title>

<link rel="stylesheet" href="store-opening.css">
</head>

<body>

<header class="header">
  <h1>신규점포 개설관리</h1>
  <p>STORE OPENING PROJECT MANAGEMENT</p>
</header>

<main class="wrap">

  <section class="summary">
    <div class="summary-card">
      <strong id="totalProjects">0</strong>
      <span>전체 프로젝트</span>
    </div>

    <div class="summary-card">
      <strong id="openSoon">0</strong>
      <span>30일 이내 오픈</span>
    </div>

    <div class="summary-card">
      <strong id="avgProgress">0%</strong>
      <span>평균 진행률</span>
    </div>
  </section>

  <section class="tabs">
    <button class="tab active" onclick="showTab('list', this)">현황</button>
    <button class="tab" onclick="showTab('project', this)">점포등록</button>
    <button class="tab" onclick="showTab('task', this)">업무등록</button>
    <button class="tab" onclick="showTab('schedule', this)">일정표</button>
  </section>

  <section id="list" class="panel active">
    <h2>점포 개설 현황</h2>
    <div id="projectList" class="project-list"></div>
  </section>

  <section id="project" class="panel">

    <h2>신규점포 등록</h2>

    <div class="form-grid">

      <label>브랜드
        <select id="brand">
          <option>한국의집</option>
          <option>고호재</option>
          <option>효종갱</option>
          <option>길채정</option>
          <option>소바공방</option>
        </select>
      </label>

      <label>점포명
        <input type="text" id="storeName">
      </label>

      <label>유통사
        <input type="text" id="retailer">
      </label>

      <label>위치
        <input type="text" id="location">
      </label>

      <label>MD 담당자
        <input type="text" id="mdName">
      </label>

      <label>내부 담당자
        <input type="text" id="owner">
      </label>

      <label>계약예정일
        <input type="date" id="contractDate">
      </label>

      <label>공사시작일
        <input type="date" id="constructionStart">
      </label>

      <label>가오픈일
        <input type="date" id="preOpenDate">
      </label>

      <label>정식오픈일
        <input type="date" id="openDate">
      </label>

      <label>현재상태
        <select id="status">
          <option>검토중</option>
          <option>계약진행</option>
          <option>공사진행</option>
          <option>오픈준비</option>
          <option>오픈완료</option>
        </select>
      </label>

      <label>진행률(%)
        <input type="number" id="progress" value="0">
      </label>

    </div>

    <label class="full-label">
      메모
      <textarea id="projectMemo"></textarea>
    </label>

    <button class="primary" onclick="saveProject()">
      점포 프로젝트 저장
    </button>

  </section>

  <section id="task" class="panel">

    <h2>업무 등록</h2>

    <div class="form-grid">

      <label>점포 선택
        <select id="taskProjectId"></select>
      </label>

      <label>업무구분
        <select id="taskCategory">
          <option>계약</option>
          <option>도면</option>
          <option>공사</option>
          <option>집기/장비</option>
          <option>인허가</option>
          <option>채용</option>
          <option>교육</option>
        </select>
      </label>

      <label>업무명
        <input type="text" id="taskTitle">
      </label>

      <label>담당자
        <input type="text" id="taskOwner">
      </label>

      <label>시작일
        <input type="date" id="taskStartDate">
      </label>

      <label>마감일
        <input type="date" id="taskDueDate">
      </label>

      <label>상태
        <select id="taskStatus">
          <option>예정</option>
          <option>진행중</option>
          <option>완료</option>
        </select>
      </label>

    </div>

    <label class="full-label">
      메모
      <textarea id="taskMemo"></textarea>
    </label>

    <button class="primary" onclick="saveTask()">
      업무 저장
    </button>

  </section>

  <section id="schedule" class="panel">

    <h2>일정표</h2>

    <div class="form-grid">

      <label>조회월
        <input type="month" id="scheduleMonth">
      </label>

      <label>점포 선택
        <select id="scheduleProjectId"></select>
      </label>

    </div>

    <div id="scheduleList"></div>

  </section>

</main>

<script src="store-opening.js"></script>

</body>
</html>
