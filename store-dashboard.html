<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매장점검 대시보드</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f4f6f9;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
  color:#222;
}

.header{
  background:linear-gradient(135deg,#2b1d12,#7c2d12);
  color:#fff;
  padding:30px 20px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin:8px 0 0;
  opacity:.8;
}

.container{
  max-width:1300px;
  margin:0 auto;
  padding:20px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.summary .card{
  text-align:center;
}

.summary strong{
  display:block;
  font-size:34px;
  color:#7c2d12;
  margin-bottom:6px;
}

.summary span{
  color:#666;
  font-size:14px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px 10px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
  vertical-align:top;
}

th{
  background:#fafafa;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.normal{
  background:#f1f5f9;
  color:#475569;
}

.important{
  background:#fff7ed;
  color:#c2410c;
}

.urgent{
  background:#fee2e2;
  color:#b91c1c;
}

textarea,select{
  width:100%;
  border:1px solid #ddd;
  border-radius:10px;
  padding:8px;
  font-size:13px;
}

textarea{
  min-height:70px;
}

.save-btn{
  border:none;
  background:#7c2d12;
  color:#fff;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:900px){
  .summary{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:700px){
  .summary{
    grid-template-columns:1fr;
  }

  table{
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>매장점검 대시보드</h1>
  <p>더큰코리아 본사 통합 모니터링</p>
</div>

<div class="container">

  <div class="summary">

    <div class="card">
      <strong id="todayCount">0</strong>
      <span>오늘 등록</span>
    </div>

    <div class="card">
      <strong id="pendingCount">0</strong>
      <span>미확인</span>
    </div>

    <div class="card">
      <strong id="urgentCount">0</strong>
      <span>긴급</span>
    </div>

    <div class="card">
      <strong id="totalCount">0</strong>
      <span>전체 건수</span>
    </div>

  </div>

  <div class="card">

    <table>
      <thead>
        <tr>
          <th>등록일</th>
          <th>점포명</th>
          <th>구분</th>
          <th>긴급도</th>
          <th>내용</th>
          <th>본사피드백</th>
          <th>조치상태</th>
          <th>저장</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycby1RoQvXt51KjoasIG-_MmD7SiMau10eRWAYiq4Vk1k2s9yRVsuEBrBVEFvmW7aX765/exec";

async function loadDashboard(){

  const res = await fetch(API_URL + "?action=getDashboard");
  const data = await res.json();

  document.getElementById("todayCount").textContent =
    data.todayCount || 0;

  document.getElementById("pendingCount").textContent =
    data.pendingCount || 0;

  document.getElementById("urgentCount").textContent =
    data.urgentCount || 0;

  document.getElementById("totalCount").textContent =
    data.totalCount || 0;

  const logs = data.logs || [];

  const tbody = document.getElementById("tbody");

  tbody.innerHTML = logs.map(log=>{

    let badgeClass = "normal";

    if(log.priority === "중요"){
      badgeClass = "important";
    }

    if(log.priority === "긴급"){
      badgeClass = "urgent";
    }

    return `
      <tr>

        <td>${log.date}</td>

        <td>
          ${log.store}<br>
          <small>${log.brand}</small>
        </td>

        <td>${log.category}</td>

        <td>
          <span class="badge ${badgeClass}">
            ${log.priority}
          </span>
        </td>

        <td style="white-space:pre-line;">
          ${log.content}
        </td>

        <td>
          <textarea id="feedback_${log.row}">
${log.feedback || ""}
          </textarea>
        </td>

        <td>
          <select id="status_${log.row}">
            <option value="미확인"
              ${log.status==="미확인"?"selected":""}>
              미확인
            </option>

            <option value="확인완료"
              ${log.status==="확인완료"?"selected":""}>
              확인완료
            </option>

            <option value="보완요청"
              ${log.status==="보완요청"?"selected":""}>
              보완요청
            </option>

            <option value="조치완료"
              ${log.status==="조치완료"?"selected":""}>
              조치완료
            </option>
          </select>
        </td>

        <td>
          <button class="save-btn"
            onclick="saveFeedback(${log.row})">
            저장
          </button>
        </td>

      </tr>
    `;
  }).join("");
}

async function saveFeedback(row){

  const feedback =
    document.getElementById("feedback_" + row).value;

  const status =
    document.getElementById("status_" + row).value;

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"updateFeedback",
      row:row,
      feedback:feedback,
      status:status
    })
  });

  const data = await res.json();

  alert(data.message || "저장완료");

  loadDashboard();
}

loadDashboard();
</script>

</body>
</html>
