<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매장점검 대시보드</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f4f6f9;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
  color:#222;
}

.header{
  background:linear-gradient(135deg,#2b1d12,#7c2d12);
  color:#fff;
  padding:30px 20px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
}

.header h1{margin:0;font-size:28px}
.header p{margin:8px 0 0;opacity:.8}

.container{
  max-width:1400px;
  margin:0 auto;
  padding:20px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.summary .card{text-align:center}

.summary strong{
  display:block;
  font-size:34px;
  color:#7c2d12;
  margin-bottom:6px;
}

.summary span{
  color:#666;
  font-size:14px;
}

.tab-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.tab-btn{
  border:none;
  background:#eee;
  color:#333;
  border-radius:999px;
  padding:10px 16px;
  font-weight:800;
  cursor:pointer;
}

.tab-btn.active{
  background:#7c2d12;
  color:#fff;
}

.tab-btn span{
  display:inline-block;
  min-width:22px;
  margin-left:6px;
  padding:2px 7px;
  border-radius:999px;
  background:#fff;
  color:#7c2d12;
  font-size:12px;
}

.filter-box{
  display:grid;
  grid-template-columns:160px 180px 150px 1fr;
  gap:10px;
  margin-bottom:16px;
}

select,input,textarea{
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

textarea{
  width:100%;
  min-height:70px;
}

.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1150px;
}

th,td{
  padding:12px 10px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
  vertical-align:top;
}

th{background:#fafafa}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.normal{background:#f1f5f9;color:#475569}
.important{background:#fff7ed;color:#c2410c}
.urgent{background:#fee2e2;color:#b91c1c}

.status-badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  background:#eef2ff;
  color:#3730a3;
}

.save-btn{
  border:none;
  background:#7c2d12;
  color:#fff;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:bold;
}

.small-text{
  color:#777;
  font-size:12px;
  margin:8px 0 12px;
}

@media(max-width:1000px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .filter-box{grid-template-columns:1fr 1fr}
}

@media(max-width:700px){
  .summary{grid-template-columns:1fr}
  .filter-box{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">
  <h1>매장점검 대시보드</h1>
  <p>더큰코리아 본사 통합 모니터링</p>
</div>

<div class="container">

  <div class="summary">
    <div class="card">
      <strong id="todayCount">0</strong>
      <span>오늘 등록</span>
    </div>
    <div class="card">
      <strong id="pendingCount">0</strong>
      <span>미확인</span>
    </div>
    <div class="card">
      <strong id="urgentCount">0</strong>
      <span>긴급</span>
    </div>
    <div class="card">
      <strong id="totalCount">0</strong>
      <span>전체 건수</span>
    </div>
  </div>

  <div class="card">

    <div class="tab-row">
      <button class="tab-btn active" onclick="setViewMode('active', this)">진행중 <span id="badgeActive">0</span></button>
      <button class="tab-btn" onclick="setViewMode('미확인', this)">미확인 <span id="badgePending">0</span></button>
      <button class="tab-btn" onclick="setViewMode('확인사항', this)">확인사항 <span id="badgeCheck">0</span></button>
      <button class="tab-btn" onclick="setViewMode('보완요청', this)">보완사항 <span id="badgeSupplement">0</span></button>
      <button class="tab-btn" onclick="setViewMode('조치필요', this)">조치사항 <span id="badgeAction">0</span></button>
      <button class="tab-btn" onclick="setViewMode('done', this)">완료내역 <span id="badgeDone">0</span></button>
      <button class="tab-btn" onclick="setViewMode('all', this)">전체 <span id="badgeAll">0</span></button>
    </div>

    <div class="filter-box">
      <select id="brandFilter" onchange="applyFilters()">
        <option value="">전체 브랜드</option>
        <option value="한국의집">한국의집</option>
        <option value="길채정">길채정</option>
        <option value="소바공방">소바공방</option>
      </select>

      <select id="storeFilter" onchange="applyFilters()">
        <option value="">전체 점포</option>
      </select>

      <input type="month" id="monthFilter" onchange="applyFilters()">

      <input type="text" id="searchInput" placeholder="점포명, 내용, 본사피드백 검색" oninput="applyFilters()">
    </div>

    <div class="small-text">
      기본 화면은 확인완료·조치완료 건을 제외한 진행중 내역만 표시됩니다.
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>등록일</th>
            <th>점포명</th>
            <th>구분</th>
            <th>긴급도</th>
            <th>내용</th>
            <th>본사피드백</th>
            <th>조치상태</th>
            <th>저장</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycby1RoQvXt51KjoasIG-_MmD7SiMau10eRWAYiq4Vk1k2s9yRVsuEBrBVEFvmW7aX765/exec";

let allLogs = [];
let currentViewMode = "active";

function setViewMode(mode, btn){
  currentViewMode = mode;

  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");
  applyFilters();
}

async function loadDashboard(){
  try{
    const res = await fetch(API_URL + "?action=getDashboard&t=" + Date.now());
    const data = await res.json();

    allLogs = data.logs || [];

    document.getElementById("todayCount").textContent = data.todayCount || 0;
    document.getElementById("pendingCount").textContent = data.pendingCount || 0;
    document.getElementById("urgentCount").textContent = data.urgentCount || 0;
    document.getElementById("totalCount").textContent = data.totalCount || 0;

    makeStoreFilter();
    updateTabBadges();
    applyFilters();

  }catch(e){
    console.log(e);
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='8'>대시보드를 불러오지 못했습니다.</td></tr>";
  }
}

function updateTabBadges(){
  const counts = {
    active: 0,
    pending: 0,
    check: 0,
    supplement: 0,
    action: 0,
    done: 0,
    all: allLogs.length
  };

  allLogs.forEach(log => {
    const status = log.status || "미확인";

    if(status !== "확인완료" && status !== "조치완료") counts.active++;
    if(status === "미확인") counts.pending++;
    if(status === "확인사항") counts.check++;
    if(status === "보완요청") counts.supplement++;
    if(status === "조치필요") counts.action++;
    if(status === "확인완료" || status === "조치완료") counts.done++;
  });

  setBadgeText("badgeActive", counts.active);
  setBadgeText("badgePending", counts.pending);
  setBadgeText("badgeCheck", counts.check);
  setBadgeText("badgeSupplement", counts.supplement);
  setBadgeText("badgeAction", counts.action);
  setBadgeText("badgeDone", counts.done);
  setBadgeText("badgeAll", counts.all);
}

function setBadgeText(id, count){
  const el = document.getElementById(id);
  if(el) el.textContent = count;
}

function makeStoreFilter(){
  const storeFilter = document.getElementById("storeFilter");
  const currentValue = storeFilter.value;

  const stores = [...new Set(
    allLogs.map(log => log.store).filter(Boolean)
  )].sort();

  storeFilter.innerHTML = `<option value="">전체 점포</option>` +
    stores.map(store => `<option value="${escapeHtml(store)}">${escapeHtml(store)}</option>`).join("");

  storeFilter.value = currentValue;
}

function applyFilters(){
  const brandFilter = document.getElementById("brandFilter").value;
  const storeFilter = document.getElementById("storeFilter").value;
  const monthFilter = document.getElementById("monthFilter").value;
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

  const filteredLogs = allLogs.filter(log => {
    const status = log.status || "미확인";

    if(currentViewMode === "active"){
      if(status === "확인완료" || status === "조치완료") return false;
    }

    if(currentViewMode === "done"){
      if(status !== "확인완료" && status !== "조치완료") return false;
    }

    if(
      currentViewMode !== "active" &&
      currentViewMode !== "done" &&
      currentViewMode !== "all"
    ){
      if(status !== currentViewMode) return false;
    }

    if(brandFilter && log.brand !== brandFilter) return false;
    if(storeFilter && log.store !== storeFilter) return false;

    if(monthFilter){
      const logDate = String(log.date || "");
      if(!logDate.startsWith(monthFilter)) return false;
    }

    if(keyword){
      const searchTarget = [
        log.store,
        log.brand,
        log.category,
        log.priority,
        log.content,
        log.feedback,
        log.status
      ].join(" ").toLowerCase();

      if(!searchTarget.includes(keyword)) return false;
    }

    return true;
  });

  renderTable(filteredLogs);
}

function renderTable(logs){
  const tbody = document.getElementById("tbody");

  if(logs.length === 0){
    tbody.innerHTML = "<tr><td colspan='8'>조회된 내역이 없습니다.</td></tr>";
    return;
  }

  tbody.innerHTML = logs.map(log => {
    let badgeClass = "normal";
    if(log.priority === "중요") badgeClass = "important";
    if(log.priority === "긴급") badgeClass = "urgent";

    const status = log.status || "미확인";
    const isDoneView = currentViewMode === "done";

    return `
      <tr style="background:${log.priority === "긴급" ? "#fff5f5" : "#fff"};">

        <td>${escapeHtml(log.date || "")}</td>

        <td>
          ${escapeHtml(log.store || "")}<br>
          <small>${escapeHtml(log.brand || "")}</small>
        </td>

        <td>${escapeHtml(log.category || "")}</td>

        <td>
          <span class="badge ${badgeClass}">
            ${escapeHtml(log.priority || "일반")}
          </span>
        </td>

        <td style="white-space:pre-line;">
          ${escapeHtml(log.content || "")}
        </td>

        <td>
          ${
            isDoneView
            ? `<div style="white-space:pre-line;">${escapeHtml(log.feedback || "-")}</div>`
            : `<textarea id="feedback_${log.row}">${escapeHtml(log.feedback || "")}</textarea>`
          }
        </td>

        <td>
          ${
            isDoneView
            ? `<span class="status-badge">${escapeHtml(status)}</span>`
            : `
              <select id="status_${log.row}">
                <option value="미확인" ${status==="미확인"?"selected":""}>미확인</option>
                <option value="확인사항" ${status==="확인사항"?"selected":""}>확인사항</option>
                <option value="보완요청" ${status==="보완요청"?"selected":""}>보완요청</option>
                <option value="조치필요" ${status==="조치필요"?"selected":""}>조치필요</option>
                <option value="확인완료" ${status==="확인완료"?"selected":""}>확인완료</option>
                <option value="조치완료" ${status==="조치완료"?"selected":""}>조치완료</option>
              </select>
            `
          }
        </td>

        <td>
          ${
            isDoneView
            ? "-"
            : `<button class="save-btn" onclick="saveFeedback(${log.row})">저장</button>`
          }
        </td>

      </tr>
    `;
  }).join("");
}

async function saveFeedback(row){
  const feedback = document.getElementById("feedback_" + row).value;
  const status = document.getElementById("status_" + row).value;

  try{
    const res = await fetch(API_URL, {
      method:"POST",
      body:JSON.stringify({
        action:"updateFeedback",
        row:row,
        feedback:feedback,
        status:status
      })
    });

    const data = await res.json();
    alert(data.message || "저장완료");

    loadDashboard();

  }catch(e){
    console.log(e);
    alert("저장 중 오류가 발생했습니다.");
  }
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadDashboard();
</script>

</body>
</html>
