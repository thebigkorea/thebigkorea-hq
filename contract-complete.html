  <script>
  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  const btn = document.getElementById("viewContractBtn");

  if (id) {
    btn.href =
      `contract-view.html?id=${encodeURIComponent(id)}&v=${Date.now()}`;
