<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일용직 근무내역 입력</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f5f8;
      color: #222;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: #1f2937;
      color: white;
      padding: 22px;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 8px 0 0;
      color: #d1d5db;
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
      font-size: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 14px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-dark {
      background: #111827;
      color: white;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-item {
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 14px;
      margin-top: 10px;
      background: #f9fafb;
      cursor: pointer;
    }

    .result-item strong {
      font-size: 17px;
    }

    .result-item p {
      margin: 6px 0 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }

    .notice {
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    .notice.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .notice.err {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .small {
      color: #6b7280;
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 520px) {
      .wrap { padding: 14px; }
      .row { grid-template-columns: 1fr; }
      .header h1 { font-size: 21px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>일용직 근무내역 입력</h1>
      <p>성함 또는 전화번호로 기존 정보를 검색한 뒤 근무내역을 저장합니다.</p>
    </div>

    <div class="card">
      <label>성함 또는 전화번호 검색</label>
      <input id="keyword" type="text" placeholder="예: 전현숙 또는 01091642554" />

      <button class="btn btn-dark" onclick="searchWorker()">검색하기</button>

      <div id="searchNotice" class="notice"></div>
      <div id="resultBox"></div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>날짜</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>매장</label>
          <select id="store">
            <option value="한국의집">한국의집</option>
            <option value="더큰코리아 본사">더큰코리아 본사</option>
            <option value="소바공방 평촌점">소바공방 평촌점</option>
            <option value="길채정 압구정점">길채정 압구정점</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <label>성함</label>
      <input id="name" type="text" placeholder="성함" />

      <div class="row">
        <div>
          <label>수당</label>
          <input id="allowance" type="number" placeholder="예: 140000 또는 14" />
        </div>
        <div>
          <label>업무</label>
          <select id="job">
            <option value="">선택</option>
            <option value="홀">홀</option>
            <option value="설거지">설거지</option>
            <option value="주방">주방</option>
            <option value="전처리">전처리</option>
            <option value="퇴식">퇴식</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <label>주민번호</label>
      <input id="rrn" type="text" placeholder="예: 610807-2057344" />

      <div class="row">
        <div>
          <label>수취은행</label>
          <input id="bank" type="text" placeholder="예: 하나" />
        </div>
        <div>
          <label>전화번호</label>
          <input id="phone" type="tel" placeholder="예: 010-9164-2554" />
        </div>
      </div>

      <label>계좌번호</label>
      <input id="account" type="text" placeholder="계좌번호" />

      <label>비고</label>
      <textarea id="memo" placeholder="특이사항 입력"></textarea>

      <label>지급여부</label>
      <select id="payStatus">
        <option value="미지급">미지급</option>
        <option value="지급완료">지급완료</option>
      </select>

      <button id="saveBtn" class="btn btn-primary" onclick="saveDailyWorker()">저장하기</button>
      <button class="btn btn-light" onclick="clearForm()">새 입력</button>

      <div id="saveNotice" class="notice"></div>
      <div class="small">저장하면 구글시트의 일용직_근무내역, 월별 현황, 미지급 현황이 자동 갱신됩니다.</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz_NFlMRhx_mP_0maccpd62iWNHGMVo-pAZCHg7s8-tM26QvKlIVrPL6TmElRgM6XIS/exec";

    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date();
      document.getElementById("date").value = today.toISOString().slice(0, 10);
    });

    function showNotice(id, type, msg) {
      const el = document.getElementById(id);
      el.className = "notice " + type;
      el.textContent = msg;
    }

    function clearNotice(id) {
      const el = document.getElementById(id);
      el.className = "notice";
      el.textContent = "";
    }

    async function searchWorker() {
      const keyword = document.getElementById("keyword").value.trim();
      const resultBox = document.getElementById("resultBox");
      resultBox.innerHTML = "";
      clearNotice("searchNotice");

      if (!keyword) {
        showNotice("searchNotice", "err", "성함 또는 전화번호를 입력해주세요.");
        return;
      }

      showNotice("searchNotice", "ok", "검색 중입니다...");

      try {
        const res = await fetch(API_URL + "?action=searchWorker&keyword=" + encodeURIComponent(keyword));
        const json = await res.json();

        resultBox.innerHTML = "";

        if (!json.success || !json.data || json.data.length === 0) {
          showNotice("searchNotice", "err", "기존 정보가 없습니다. 아래에 직접 입력해주세요.");
          document.getElementById("name").value = keyword;
          return;
        }

        showNotice("searchNotice", "ok", json.data.length + "건의 기존 정보를 찾았습니다.");

        json.data.forEach(worker => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <strong>${worker.name || ""} / ${formatPhone(worker.phone || "")}</strong>
            <p>
              은행: ${worker.bank || "-"}<br>
              계좌: ${worker.account || "-"}<br>
              최근업무: ${worker.lastJob || "-"} / 최근수당: ${worker.lastAllowance || "-"}
            </p>
          `;
          div.onclick = () => {
            const ok = confirm(
              `${worker.name} 님의 기존 정보가 있습니다.\n\n` +
              `전화번호: ${formatPhone(worker.phone || "")}\n` +
              `은행: ${worker.bank || "-"}\n` +
              `계좌: ${worker.account || "-"}\n\n` +
              `이 정보로 입력하시겠습니까?`
            );

            if (ok) fillWorker(worker);
          };
          resultBox.appendChild(div);
        });
      } catch (err) {
        showNotice("searchNotice", "err", "검색 중 오류가 발생했습니다. 배포 URL 또는 권한을 확인해주세요.");
      }
    }

    function fillWorker(worker) {
      document.getElementById("name").value = worker.name || "";
      document.getElementById("phone").value = formatPhone(worker.phone || "");
      document.getElementById("rrn").value = worker.rrn || "";
      document.getElementById("bank").value = worker.bank || "";
      document.getElementById("account").value = worker.account || "";

      if (worker.lastJob) document.getElementById("job").value = worker.lastJob;
      if (worker.lastAllowance) document.getElementById("allowance").value = worker.lastAllowance;

      showNotice("searchNotice", "ok", "기존 정보를 불러왔습니다. 날짜와 업무 내용을 확인 후 저장하세요.");
    }

    async function saveDailyWorker() {
      clearNotice("saveNotice");

      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      btn.textContent = "저장 중...";

      const data = {
        action: "saveDailyWorker",
        date: document.getElementById("date").value,
        store: document.getElementById("store").value,
        name: document.getElementById("name").value.trim(),
        allowance: document.getElementById("allowance").value,
        job: document.getElementById("job").value,
        rrn: document.getElementById("rrn").value.trim(),
        bank: document.getElementById("bank").value.trim(),
        account: document.getElementById("account").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        memo: document.getElementById("memo").value.trim(),
        payStatus: document.getElementById("payStatus").value
      };

      if (!data.name) {
        showNotice("saveNotice", "err", "성함을 입력해주세요.");
        resetButton();
        return;
      }

      if (!data.phone) {
        showNotice("saveNotice", "err", "전화번호를 입력해주세요.");
        resetButton();
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        const json = await res.json();

        if (json.success) {
          showNotice("saveNotice", "ok", json.message || "저장되었습니다.");
          document.getElementById("keyword").value = "";
          document.getElementById("resultBox").innerHTML = "";
        } else {
          showNotice("saveNotice", "err", json.message || "저장에 실패했습니다.");
        }
      } catch (err) {
        showNotice("saveNotice", "err", "저장 중 오류가 발생했습니다. 웹앱 배포 권한을 확인해주세요.");
      }

      resetButton();
    }

    function resetButton() {
      const btn = document.getElementById("saveBtn");
      btn.disabled = false;
      btn.textContent = "저장하기";
    }

    function clearForm() {
      document.getElementById("keyword").value = "";
      document.getElementById("resultBox").innerHTML = "";
      clearNotice("searchNotice");
      clearNotice("saveNotice");

      const today = new Date();
      document.getElementById("date").value = today.toISOString().slice(0, 10);
      document.getElementById("store").value = "한국의집";
      document.getElementById("name").value = "";
      document.getElementById("allowance").value = "";
      document.getElementById("job").value = "";
      document.getElementById("rrn").value = "";
      document.getElementById("bank").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("account").value = "";
      document.getElementById("memo").value = "";
      document.getElementById("payStatus").value = "미지급";
    }

    function formatPhone(phone) {
      const num = String(phone || "").replace(/[^0-9]/g, "");

      if (num.length === 11) {
        return num.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");
      }

      if (num.length === 10) {
        return num.replace(/(\d{3})(\d{3})(\d{4})/, "$1-$2-$3");
      }

      return phone || "";
    }
  </script>
</body>
</html>
