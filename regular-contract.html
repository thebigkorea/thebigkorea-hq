<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정규직 근로계약서</title>
  <link rel="stylesheet" href="regular-contract.css" />
</head>

<body>
  <div class="page">

    <header class="header">
      <h1>정규직 근로계약서</h1>
      <p>Regular Employment Contract</p>
    </header>

    <main class="card">

      <section class="section">
        <h2>사업장 정보</h2>

        <div class="grid">
          <label>
            사업장 선택
            <select id="workplaceCode">
              <option value="hq">더큰코리아 본사</option>
              <option value="koreahouse_jamsil">한국의집 롯데월드몰점</option>
              <option value="gilchaejeong_apgujeong">길채정 압구정</option>
              <option value="sobagongbang_pyeongchon">평촌 소바공방</option>
              <option value="koreahouse_hyojonggang_paju">한국의집 효종갱 파주</option>
            </select>
          </label>

          <label>
            계약종류
            <input id="contractType" value="정규직 근로계약서" readonly />
          </label>
        </div>

        <div id="workplaceInfo" class="info-box"></div>
      </section>

      <section class="section">
        <h2>직원 기본정보</h2>

        <div class="grid">
          <label>직원 성명
            <input id="empName" placeholder="직원의 이름을 입력하세요" />
          </label>

          <label>주민등록번호
            <input id="residentNo" placeholder="예: 900101-1234567" maxlength="14" />
          </label>

          <label>생년월일
            <input id="birth" placeholder="주민번호 입력 시 자동 입력" readonly />
          </label>

          <label>연락처
            <input id="phone" placeholder="예: 010-0000-0000" />
          </label>

          <label class="full">주소
            <input id="address" placeholder="직원 주소 입력" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>근무 정보</h2>

        <div class="grid">
          <label>입사일
            <input id="joinDate" type="date" />
          </label>

          <label>주 근무일수
            <select id="workDays">
              <option value="">선택</option>
              <option value="주 5일">주 5일</option>
              <option value="주 6일">주 6일</option>
              <option value="스케줄 근무">스케줄 근무</option>
            </select>
          </label>

          <label>월 기준시간
            <input id="monthHour" value="209" />
          </label>

          <label>출근시간
            <select id="startTime"></select>
          </label>

          <label>퇴근시간
            <select id="endTime"></select>
          </label>

          <label>휴게시간
            <select id="breakTime">
              <option value="">선택</option>
              <option value="30분">30분</option>
              <option value="1시간">1시간</option>
              <option value="1시간 30분">1시간 30분</option>
              <option value="2시간">2시간</option>
            </select>
          </label>

          <label>근무장소
            <input id="workPlace" />
          </label>

          <label>업무내용
            <select id="jobDuty">
              <option value="">선택</option>
              <option value="홀">홀</option>
              <option value="주방">주방</option>
              <option value="조리">조리</option>
              <option value="찬모">찬모</option>
              <option value="세척">세척</option>
              <option value="관리자">관리자</option>
              <option value="매니저">매니저</option>
              <option value="본사 업무">본사 업무</option>
              <option value="기타">기타</option>
            </select>
         </label>

         <label id="jobDutyEtcWrap" style="display:none;">
           기타 업무내용
           <input id="jobDutyEtc" placeholder="업무내용 직접 입력" />
         </label>
        </div>
      </section>

      <section class="section">
        <h2>임금 정보</h2>

        <div class="grid">
          <label>기본급
            <input id="basePay" class="money" placeholder="예: 2,000,000" />
          </label>

          <label>연장수당
            <input id="overtimePay" class="money" placeholder="예: 300,000" />
          </label>

          <label>직무수당
            <input id="dutyPay" class="money" placeholder="예: 200,000" />
          </label>

          <label>직책수당
            <input id="positionPay" class="money" placeholder="예: 1,000,000" />
          </label>

          <label>식대
            <input id="mealPay" class="money" placeholder="예: 100,000" />
          </label>

          <label>월급총액
            <input id="totalPay" readonly />
          </label>

          <label>급여은행
            <input id="bankName" placeholder="예: 국민은행" />
          </label>

          <label>계좌번호
            <input id="bankAccount" placeholder="예: 816901-04-112155" />
          </label>
        </div>
      </section>

      <div class="buttons">
        <button class="blue" onclick="makePreview()">정규직 근로계약서 생성</button>
        <button class="green" id="saveBtn" onclick="saveContract()">계약 저장 및 직원 링크 생성</button>
      </div>

      <section class="section preview-section">
        <h2>계약서 미리보기</h2>
        <div id="preview" class="preview"></div>
      </section>

      <div id="resultBox" class="result-box" style="display:none;"></div>

    </main>
  </div>

  <script src="regular-contract.js"></script>
</body>
</html>
