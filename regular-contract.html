<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정규직 근로계약서 작성</title>
  <link rel="stylesheet" href="regular-contract.css" />
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="logo">大</div>
      <div>
        <h1>정규직 근로계약서 작성</h1>
        <p>THE BIG KOREA HR SYSTEM</p>
      </div>
    </header>

    <main class="card">
      <section class="section">
        <h2>1. 사업장 선택</h2>

        <div class="grid">
          <label>
            사업장
            <select id="workplaceCode">
              <option value="hq">더큰코리아 본사</option>
              <option value="koreahouse_jamsil">한국의집 잠실롯데월드몰</option>
              <option value="gilchaejeong_apgujeong">길채정 압구정</option>
              <option value="sobagongbang_pyeongchon">평촌 소바공방</option>
            </select>
          </label>

          <label>
            계약종류
            <input id="contractType" value="정규직 근로계약서" readonly />
          </label>
        </div>

        <div id="workplaceInfo" class="info-box"></div>
      </section>

      <section class="section">
        <h2>2. 근로자 정보</h2>

        <div class="grid">
          <label>직원명 <input id="empName" /></label>
          <label>연락처 <input id="phone" placeholder="010-0000-0000" /></label>
          <label>생년월일 <input id="birth" type="date" /></label>
          <label>주민등록번호 <input id="residentNo" placeholder="000000-0000000" /></label>
          <label class="full">주소 <input id="address" /></label>
          <label>입사일 <input id="joinDate" type="date" /></label>
          <label>직책/직무 <input id="jobDuty" placeholder="홀 / 주방 / 매니저 등" /></label>
        </div>
      </section>

      <section class="section">
        <h2>3. 근무조건</h2>

        <div class="grid">
          <label>근무장소 <input id="workPlace" /></label>
          <label>근무일수 <input id="workDays" placeholder="주 5일" /></label>
          <label>월 기준시간 <input id="monthHour" placeholder="209시간" /></label>
          <label>근무시간 <input id="workTime" placeholder="09:00 ~ 18:00" /></label>
          <label>휴게시간 <input id="breakTime" placeholder="1시간" /></label>
          <label>주휴일 <input id="holiday" placeholder="매주 1일" /></label>
        </div>
      </section>

      <section class="section">
        <h2>4. 임금조건</h2>

        <div class="grid">
          <label>기본급 <input id="basePay" type="number" /></label>
          <label>연장수당 <input id="overtimePay" type="number" /></label>
          <label>직무수당 <input id="dutyPay" type="number" /></label>
          <label>직책수당 <input id="positionPay" type="number" /></label>
          <label>식대 <input id="mealPay" type="number" /></label>
          <label>월급총액 <input id="totalPay" type="number" readonly /></label>
        </div>
      </section>

      <section class="section">
        <h2>5. 계약서 미리보기</h2>
        <div id="preview" class="preview"></div>
      </section>

      <div class="buttons">
        <button onclick="makePreview()" class="gray">미리보기</button>
        <button onclick="saveContract()" id="saveBtn">계약 저장 및 직원 링크 생성</button>
      </div>

      <div id="resultBox" class="result-box" style="display:none;"></div>
    </main>
  </div>

  <script src="regular-contract.js"></script>
</body>
</html>
