<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계약직·아르바이트 근로계약서</title>
  <link rel="stylesheet" href="part-contract.css" />
</head>

<body>
  <div class="page">

    <header class="header">
      <h1>계약직·아르바이트 근로계약서</h1>
      <p>Part-time / Fixed-term Employment Contract</p>
    </header>

    <main class="card">

      <section class="section">
        <h2>사업장 정보</h2>

        <div class="grid">
          <label>사업장 선택
            <select id="workplaceCode">
              <option value="hq">더큰코리아 본사</option>
              <option value="koreahouse_jamsil">한국의집 롯데월드몰점</option>
              <option value="gilchaejeong_apgujeong">길채정 압구정</option>
              <option value="sobagongbang_pyeongchon">평촌 소바공방</option>
            </select>
          </label>

          <label>계약종류
            <select id="contractType">
              <option value="계약직 근로계약서">계약직 근로계약서</option>
              <option value="아르바이트 근로계약서">아르바이트 근로계약서</option>
            </select>
          </label>
        </div>

        <div id="workplaceInfo" class="info-box"></div>
      </section>

      <section class="section">
        <h2>직원 기본정보</h2>

        <div class="grid">
          <label>직원 성명
            <input id="empName" placeholder="직원의 이름을 입력하세요" />
          </label>

          <label>주민등록번호
            <input id="residentNo" placeholder="예: 900101-1234567" maxlength="14" />
          </label>

          <label>생년월일
            <input id="birth" placeholder="주민번호 입력 시 자동 입력" readonly />
          </label>

          <label>연락처
            <input id="phone" placeholder="예: 010-0000-0000" />
          </label>

          <label class="full">주소
            <input id="address" placeholder="직원 주소 입력" />
          </label>
        </div>
      </section>

            </section>

      <section class="section">
        <h2>신분증 등록</h2>

        <div class="grid">

          <label class="full">
            신분증 사진

            <input id="idCardFile"
                   type="file"
                   accept="image/*"
                   capture="environment">
          </label>

        </div>

        <p style="font-size:13px; color:#777; margin-top:10px;">
          휴대폰에서는 카메라 촬영 또는 사진첩 선택이 가능합니다.
        </p>

        <div id="idCardPreview" style="margin-top:12px;"></div>

      </section>

      <section class="section">
        <h2>계약 및 근무 정보</h2>

      <section class="section">
        <h2>계약 및 근무 정보</h2>

        <div class="grid">
          <label>계약 시작일
            <input id="startDate" type="date" />
          </label>

          <label>계약 종료일
            <input id="endDate" type="date" />
          </label>

          <label>주 근무일수
            <select id="workDays">
              <option value="">선택</option>
              <option value="주 2일">주 2일</option>
              <option value="주 3일">주 3일</option>
              <option value="주 4일">주 4일</option>
              <option value="주 5일">주 5일</option>
              <option value="주 6일">주 6일</option>
              <option value="스케줄 근무">스케줄 근무</option>
            </select>
          </label>

          <label>출근시간
            <select id="startTime"></select>
          </label>

          <label>퇴근시간
            <select id="endTime"></select>
          </label>

          <label>휴게시간
            <select id="breakTime">
              <option value="">선택</option>
              <option value="30분">30분</option>
              <option value="1시간">1시간</option>
              <option value="1시간 30분">1시간 30분</option>
              <option value="2시간">2시간</option>
            </select>
          </label>

          <label>근무장소
            <input id="workPlace" />
          </label>

          <label>업무내용
            <select id="jobDuty">
              <option value="">선택</option>
              <option value="홀">홀</option>
              <option value="주방">주방</option>
              <option value="조리">조리</option>
              <option value="찬모">찬모</option>
              <option value="세척">세척</option>
              <option value="관리자">관리자</option>
              <option value="매니저">매니저</option>
              <option value="기타">기타</option>
            </select>
          </label>

          <label id="jobDutyEtcWrap" style="display:none;">
            기타 업무내용
            <input id="jobDutyEtc" placeholder="업무내용 직접 입력" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>임금 정보</h2>

        <div class="grid">
          <label>시급
            <input id="hourPay" class="money" placeholder="예: 12,000" />
          </label>

          
          <label>주휴수당
            <select id="weeklyHolidayPay">
              <option value="">선택</option>
              <option value="포함">포함</option>
              <option value="미포함">미포함</option>
            </select>
          </label>

          <label>4대보험
            <select id="insurance">
              <option value="">선택</option>
              <option value="가입">가입</option>
              <option value="미가입">미가입</option>
              <option value="근로조건에 따라 적용">근로조건에 따라 적용</option>
            </select>
          </label>

          <label>급여은행
            <input id="bankName" placeholder="예: 국민은행" />
          </label>

          <label>계좌번호
            <input id="bankAccount" placeholder="예: 816901-04-112155" />
          </label>
        </div>
      </section>

      <div class="buttons">
        <button class="blue" onclick="makePreview()">계약직·아르바이트 계약서 생성</button>
        <button class="green" id="saveBtn" onclick="saveContract()">계약 저장 및 직원 링크 생성</button>
      </div>

      <section class="section preview-section">
        <h2>계약서 미리보기</h2>
        <div id="preview" class="preview"></div>
      </section>

      <div id="resultBox" class="result-box" style="display:none;"></div>

    </main>
  </div>

  <script src="part-contract.js"></script>
</body>
</html>
