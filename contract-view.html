<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전자근로계약 완료본</title>

  <style>
    body{margin:0;background:#f3f5f9;font-family:'Pretendard','Noto Sans KR',sans-serif;color:#222}
    .loading{width:100%;height:100vh;display:flex;justify-content:center;align-items:center;font-size:22px;font-weight:800;color:#1f3f75;text-align:center;padding:20px}
    .contract-wrap{max-width:1100px;margin:40px auto;background:#fff;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08);overflow:hidden}
    .top-area{background:#1f3f75;color:#fff;padding:50px 30px;text-align:center}
    .top-area h1{margin:0;font-size:48px;letter-spacing:8px;font-weight:900}
    .top-area p{margin-top:14px;font-size:18px;opacity:.9}
    .content{padding:50px;line-height:1.9;font-size:20px}
    .section-title{font-size:30px;font-weight:900;margin-top:54px;margin-bottom:20px;color:#1f3f75;border-left:8px solid #1f3f75;padding-left:16px}
    .contract-table{width:100%;border-collapse:collapse;margin:20px 0 36px}
    .contract-table th{background:#1f3f75;color:#fff;padding:16px;font-size:18px;border:1px solid #d9dee7}
    .contract-table td{padding:16px;border:1px solid #d9dee7;text-align:center;font-size:18px}
    .sign-area{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:70px}
    .sign-box{border:2px solid #d9dee7;border-radius:20px;padding:28px;min-height:360px}
    .sign-box h3{margin-top:0;margin-bottom:20px;color:#1f3f75;font-size:30px}
    .sign-box p{margin:12px 0;font-size:19px}
    .company-seal{width:150px;margin-top:18px}
    .signature-img{width:240px;margin-top:18px;border-bottom:3px solid #222}
    .bottom-buttons{display:flex;gap:16px;margin-top:50px}
    .btn{flex:1;height:64px;border:none;border-radius:16px;font-size:21px;font-weight:900;cursor:pointer}
    .btn-print{background:#1f3f75;color:#fff}
    @media(max-width:768px){
      .contract-wrap{margin:0;border-radius:0}
      .content{padding:26px;font-size:17px}
      .top-area h1{font-size:32px;letter-spacing:3px}
      .section-title{font-size:24px}
      .contract-table th,.contract-table td{font-size:15px;padding:10px}
      .sign-area{grid-template-columns:1fr}
      .sign-box{min-height:auto}
      .btn{width:100%}
    }
    @media print{
      body{background:#fff}
      .contract-wrap{box-shadow:none;margin:0;border-radius:0}
      .bottom-buttons{display:none}
    }
  </style>
</head>

<body>

<div id="loading" class="loading">
  계약서 불러오는 중...
</div>

<div id="contractWrap" class="contract-wrap" style="display:none;">
  <div class="top-area">
    <h1>전자근로계약 완료본</h1>
    <p>THE BIG KOREA HR SYSTEM</p>
  </div>

  <div class="content" id="contractContent"></div>
</div>

<script src="contract-view.js"></script>
</body>
</html>
