<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>더큰코리아 법인차량관리</title>
  <link rel="stylesheet" href="vehicle.css" />
</head>

<body>
  <header class="header">
    <div>
      <h1>더큰코리아 법인차량관리</h1>
      <p>COMPANY VEHICLE MANAGEMENT</p>
    </div>
  </header>

  <main class="container">

    <section class="summary">
      <div class="summary-card">
        <strong id="totalLogs">0</strong>
        <span>총 운행건수</span>
      </div>

      <div class="summary-card">
        <strong id="totalDistance">0 km</strong>
        <span>총 운행거리</span>
      </div>

      <div class="summary-card">
        <strong id="totalCost">0 원</strong>
        <span>총 비용</span>
      </div>
    </section>

    <section class="tabs">
      <button class="tab active" onclick="showTab('log')">운행일지</button>
      <button class="tab" onclick="showTab('vehicle')">차량등록</button>
      <button class="tab" onclick="showTab('maintenance')">정비등록</button>
      <button class="tab" onclick="showTab('accident')">사고등록</button>
      <button class="tab" onclick="showTab('expense')">비용등록</button>
      <button class="tab" onclick="showTab('reservation')">차량예약</button>
    </section>

    <section id="log" class="panel active">
      <h2>운행일지 입력</h2>

      <div class="form-grid">
        <label>사용일자<input type="date" id="useDate"></label>
        <label>운전자<input type="text" id="driver" placeholder="예: 홍길동"></label>
        <label>차량번호<select id="carNumber"></select></label>
        <label>사용목적<input type="text" id="purpose" placeholder="예: 지점 방문"></label>
        <label>방문처<input type="text" id="destination" placeholder="예: 롯데월드몰"></label>
        <label>출발 km<input type="number" id="startKm"></label>
        <label>종료 km<input type="number" id="endKm"></label>
        <label>주유비<input type="number" id="fuelCost" value="0"></label>
        <label>주차비<input type="number" id="parkingCost" value="0"></label>
        <label>톨비<input type="number" id="tollCost" value="0"></label>
      </div>

      <label class="full-label">특이사항<textarea id="memo"></textarea></label>

      <button class="submit" onclick="saveVehicleLog()">운행일지 저장</button>
    </section>

    <section id="vehicle" class="panel">
      <h2>차량등록</h2>

      <div class="form-grid">
        <label>차량번호<input type="text" id="newCarNumber" placeholder="예: 12가3456"></label>
        <label>차종<input type="text" id="carModel" placeholder="예: 벤츠 GLS 450d"></label>
        <label>담당자<input type="text" id="manager"></label>
        <label>보험사<input type="text" id="insuranceCompany"></label>
        <label>보험만기일<input type="date" id="insuranceEndDate"></label>
        <label>정비주기 km<input type="number" id="maintenanceKm" placeholder="예: 10000"></label>
        <label>현재 km<input type="number" id="currentKm"></label>
        <label>사용여부
          <select id="isActive">
            <option value="사용">사용</option>
            <option value="중지">중지</option>
          </select>
        </label>
      </div>

      <label class="full-label">비고<textarea id="vehicleMemo"></textarea></label>

      <button class="submit" onclick="saveVehicle()">차량 저장</button>
    </section>

    <section id="maintenance" class="panel">
      <h2>정비내역 등록</h2>

      <div class="form-grid">
        <label>차량번호<select id="maintenanceCarNumber"></select></label>
        <label>정비일자<input type="date" id="maintenanceDate"></label>
        <label>정비항목<input type="text" id="maintenanceItem" placeholder="예: 엔진오일"></label>
        <label>정비업체<input type="text" id="maintenanceCompany"></label>
        <label>정비비용<input type="number" id="maintenanceCost" value="0"></label>
        <label>다음정비예정일<input type="date" id="nextDate"></label>
      </div>

      <label class="full-label">비고<textarea id="maintenanceMemo"></textarea></label>

      <button class="submit" onclick="saveMaintenance()">정비내역 저장</button>
    </section>

    <section id="accident" class="panel">
      <h2>사고내역 등록</h2>

      <div class="form-grid">
        <label>사고일자<input type="date" id="accidentDate"></label>
        <label>차량번호<select id="accidentCarNumber"></select></label>
        <label>운전자<input type="text" id="accidentDriver"></label>
        <label>사고장소<input type="text" id="accidentPlace"></label>
        <label>보험접수번호<input type="text" id="insuranceNo"></label>
        <label>처리상태
          <select id="accidentStatus">
            <option value="접수">접수</option>
            <option value="처리중">처리중</option>
            <option value="완료">완료</option>
          </select>
        </label>
      </div>

      <label class="full-label">사고내용<textarea id="accidentContent"></textarea></label>
      <label class="full-label">비고<textarea id="accidentMemo"></textarea></label>

      <button class="submit" onclick="saveAccident()">사고내역 저장</button>
    </section>

    <section id="expense" class="panel">
      <h2>비용내역 등록</h2>

      <div class="form-grid">
        <label>사용일자<input type="date" id="expenseUseDate"></label>
        <label>차량번호<select id="expenseCarNumber"></select></label>
        <label>항목
          <select id="expenseItem">
            <option value="주유비">주유비</option>
            <option value="주차비">주차비</option>
            <option value="톨비">톨비</option>
            <option value="세차비">세차비</option>
            <option value="기타">기타</option>
          </select>
        </label>
        <label>금액<input type="number" id="expenseAmount" value="0"></label>
        <label>결제수단
          <select id="payment">
            <option value="법인카드">법인카드</option>
            <option value="현금">현금</option>
            <option value="개인카드">개인카드</option>
            <option value="기타">기타</option>
          </select>
        </label>
      </div>

      <label class="full-label">비고<textarea id="expenseMemo"></textarea></label>

      <button class="submit" onclick="saveExpense()">비용내역 저장</button>
    </section>

    <section id="reservation" class="panel">
     <h2>차량 예약</h2>

      <div class="form-grid">

      <label>
        예약일자
        <input type="date" id="reserveDate">
      </label>

      <label>
        예약자
        <input type="text" id="reserveUserName" placeholder="예: 홍길동">
      </label>

      <label>
        차량번호
        <select id="reserveCarNumber"></select>
      </label>

      <label>
        사용목적
        <input type="text" id="reservePurpose" placeholder="예: 점포 방문">
      </label>

      <label>
        방문처
        <input type="text" id="reserveDestination" placeholder="예: 잠실 롯데월드몰">
      </label>

      <label>
        시작시간
        <input type="time" id="reserveStartTime">
      </label>

      <label>
        종료시간
        <input type="time" id="reserveEndTime">
      </label>

    </div>

    <label class="full-label">
      비고
      <textarea id="reserveMemo"></textarea>
    </label>

    <button class="submit" onclick="saveReservation()">
      차량 예약 저장
    </button>
  </section>

    <section class="history">
      <h2>최근 운행내역</h2>
      <div id="logList" class="log-list"></div>
    </section>

  </main>

  <script src="vehicle.js"></script>
</body>
</html>
