<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국의집 매장 운영관리</title>
  <link rel="stylesheet" href="store-manager.css" />
</head>
<body>
  <header class="header">
    <h1>한국의집 매장 운영관리</h1>
    <p>STORE OPERATION MANAGEMENT</p>
  </header>

  <main class="container">
    <section class="summary">
      <div class="summary-card"><strong id="todayCount">0</strong><span>오늘 등록</span></div>
      <div class="summary-card"><strong id="urgentCount">0</strong><span>긴급사항</span></div>
      <div class="summary-card"><strong id="pendingCount">0</strong><span>본사 미확인</span></div>
    </section>

    <section class="tabs">
      <button class="tab active" onclick="showTab('daily', this)">일일보고</button>
      <button class="tab" onclick="showTab('employee', this)">직원관리</button>
      <button class="tab" onclick="showTab('customer', this)">고객관리</button>
      <button class="tab" onclick="showTab('facility', this)">설비관리</button>
      <button class="tab" onclick="showTab('hygiene', this)">위생점검</button>
      <button class="tab" onclick="showTab('complaint', this)">컴플레인</button>
      <button class="tab" onclick="showTab('history', this)">최근내역</button>
    </section>

    <section id="daily" class="panel active">
      <h2>일일 운영보고</h2>
      <div class="form-grid">
        <label>점포명<select id="dailyStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>보고일자<input type="date" id="dailyDate"></label>
        <label>작성자<input type="text" id="dailyWriter" placeholder="예: 점장 홍길동"></label>
        <label>긴급도<select id="dailyUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
      </div>
      <label class="full-label">오늘 주요 이슈<textarea id="dailyIssue"></textarea></label>
      <label class="full-label">본사 전달사항<textarea id="dailyRequest"></textarea></label>
      <label class="full-label">내일 준비사항<textarea id="dailyTomorrow"></textarea></label>
      <button class="primary" onclick="saveDailyReport()">일일보고 저장</button>
    </section>

    <section id="employee" class="panel">
      <h2>직원관리 기록</h2>
      <div class="form-grid">
        <label>점포명<select id="employeeStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>일자<input type="date" id="employeeDate"></label>
        <label>직원명<input type="text" id="employeeName"></label>
        <label>관리구분<select id="employeeType"><option>근태</option><option>지각</option><option>결근</option><option>교육</option><option>복장/유니폼</option><option>근무태도</option><option>기타</option></select></label>
        <label>긴급도<select id="employeeUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
        <label>처리상태<select id="employeeStatus"><option>기록</option><option>조치중</option><option>완료</option></select></label>
      </div>
      <label class="full-label">내용<textarea id="employeeMemo"></textarea></label>
      <button class="primary" onclick="saveEmployeeLog()">직원관리 저장</button>
    </section>

    <section id="customer" class="panel">
      <h2>고객관리 기록</h2>
      <div class="form-grid">
        <label>점포명<select id="customerStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>일자<input type="date" id="customerDate"></label>
        <label>고객명/단체명<input type="text" id="customerName"></label>
        <label>고객구분<select id="customerType"><option>일반고객</option><option>VIP</option><option>단체예약</option><option>외국인</option><option>백화점 관계자</option><option>기타</option></select></label>
        <label>방문/예약시간<input type="time" id="customerTime"></label>
        <label>긴급도<select id="customerUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
      </div>
      <label class="full-label">요청사항 / 특이사항<textarea id="customerMemo"></textarea></label>
      <button class="primary" onclick="saveCustomerLog()">고객관리 저장</button>
    </section>

    <section id="facility" class="panel">
      <h2>매장설비 관리</h2>
      <div class="form-grid">
        <label>점포명<select id="facilityStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>일자<input type="date" id="facilityDate"></label>
        <label>설비구분<select id="facilityType"><option>냉장고</option><option>냉동고</option><option>주방기기</option><option>POS</option><option>조명</option><option>수도/누수</option><option>전기</option><option>기타</option></select></label>
        <label>상태<select id="facilityStatus"><option>정상</option><option>점검필요</option><option>수리요청</option><option>수리완료</option></select></label>
        <label>긴급도<select id="facilityUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
        <label>업체/담당자<input type="text" id="facilityCompany"></label>
      </div>
      <label class="full-label">내용<textarea id="facilityMemo"></textarea></label>
      <button class="primary" onclick="saveFacilityLog()">설비관리 저장</button>
    </section>

    <section id="hygiene" class="panel">
      <h2>위생·청소 점검</h2>
      <div class="form-grid">
        <label>점포명<select id="hygieneStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>점검일자<input type="date" id="hygieneDate"></label>
        <label>점검구분<select id="hygieneType"><option>홀 청소</option><option>주방 청소</option><option>냉장고 온도</option><option>냉동고 온도</option><option>식자재 상태</option><option>폐기/유통기한</option><option>위생교육</option><option>기타</option></select></label>
        <label>점검결과<select id="hygieneResult"><option>양호</option><option>주의</option><option>불량</option><option>조치완료</option></select></label>
        <label>점검자<input type="text" id="hygieneChecker"></label>
        <label>긴급도<select id="hygieneUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
      </div>
      <label class="full-label">내용<textarea id="hygieneMemo"></textarea></label>
      <button class="primary" onclick="saveHygieneLog()">위생점검 저장</button>
    </section>

    <section id="complaint" class="panel">
      <h2>컴플레인 / 사고 기록</h2>
      <div class="form-grid">
        <label>점포명<select id="complaintStore"><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>발생일자<input type="date" id="complaintDate"></label>
        <label>구분<select id="complaintType"><option>음식</option><option>서비스</option><option>대기시간</option><option>직원응대</option><option>시설</option><option>안전사고</option><option>기타</option></select></label>
        <label>고객명/연락처<input type="text" id="complaintCustomer"></label>
        <label>처리상태<select id="complaintStatus"><option>접수</option><option>처리중</option><option>완료</option></select></label>
        <label>긴급도<select id="complaintUrgency"><option>일반</option><option>중요</option><option>긴급</option></select></label>
      </div>
      <label class="full-label">내용 및 조치사항<textarea id="complaintMemo"></textarea></label>
      <button class="primary" onclick="saveComplaintLog()">컴플레인 저장</button>
    </section>

    <section id="history" class="panel">
      <h2>최근 등록내역</h2>
      <div class="form-grid">
        <label>점포 선택<select id="historyStore" onchange="loadRecentLogs()"><option value="">전체</option><option>한국의집 잠실</option><option>고호재</option><option>효종갱</option><option>기타</option></select></label>
        <label>구분<select id="historyType" onchange="loadRecentLogs()"><option value="">전체</option><option>일일보고</option><option>직원관리</option><option>고객관리</option><option>설비관리</option><option>위생점검</option><option>컴플레인</option></select></label>
      </div>
      <div id="recentList" class="recent-list"></div>
    </section>
  </main>

  <script src="store-manager.js"></script>
</body>
</html>
