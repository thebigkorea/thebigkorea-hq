<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>디자인팀 업무관리</title>

  <link rel="stylesheet" href="design-task.css">
</head>

<body>

<header class="header">
  <h1>디자인팀 업무관리</h1>
  <p>THEBIGKOREA DESIGN TASK MANAGEMENT</p>
</header>

<main class="wrap">

  <section class="summary">
    <div class="summary-card">
      <strong id="activeCount">0</strong>
      <span>진행중 업무</span>
    </div>

    <div class="summary-card">
      <strong id="urgentCount">0</strong>
      <span>긴급 업무</span>
    </div>

    <div class="summary-card">
      <strong id="overdueCount">0</strong>
      <span>기한초과</span>
    </div>

    <div class="summary-card">
      <strong id="doneCount">0</strong>
      <span>완료 업무</span>
    </div>
  </section>

  <section class="tabs">
    <button class="tab active" onclick="showTab('register', this)">업무등록</button>
    <button class="tab" onclick="showTab('list', this)">진행업무</button>
    <button class="tab" onclick="showTab('done', this)">완료업무조회</button>
  </section>

  <section id="register" class="panel active">

    <h2>디자인 업무 등록</h2>

    <div class="form-grid">

      <label>관련 점포
        <select id="storeName">
          <option value="">점포를 선택하세요</option>
          <option>한국의집 롯데월드몰점</option>
          <option>고호재 롯데월드몰점</option>
          <option>효종갱 파주프리미엄아울렛점</option>
          <option>압구정 길채정</option>
          <option>평촌 소바공방</option>
          <option>고궁 롯데부여아울렛점</option>
          <option>카페그랑떼</option>
          <option>기타</option>
        </select>
      </label>

      <label>업무유형
        <select id="category">
          <option>간판</option>
          <option>메뉴판</option>
          <option>POP</option>
          <option>배너</option>
          <option>포스터</option>
          <option>SNS 이미지</option>
          <option>패키지</option>
          <option>로고/상표</option>
          <option>인쇄물</option>
          <option>기타</option>
        </select>
      </label>

      <label>업무명
        <input type="text" id="title" placeholder="예: 파주 효종갱 오픈 메뉴판 제작">
      </label>

      <label>요청자
        <input type="text" id="requester" placeholder="예: 영업팀 ㅇㅇㅇ">
      </label>

      <label>디자인 담당자
        <input type="text" id="owner" value="김병식" readonly>
      </label>

      <label>요청일
        <input type="date" id="requestDate">
      </label>

      <label>목표일
        <input type="date" id="dueDate">
      </label>

      <label>중요도
        <select id="priority">
          <option>보통</option>
          <option>중요</option>
          <option>긴급</option>
        </select>
      </label>

      <label>진행률(%)
  <select id="progress">
    <option value="0">0%</option>
    <option value="10">10%</option>
    <option value="20">20%</option>
    <option value="30">30%</option>
    <option value="40">40%</option>
    <option value="50">50%</option>
    <option value="60">60%</option>
    <option value="70">70%</option>
    <option value="80">80%</option>
    <option value="90">90%</option>
    <option value="100">100% 완료</option>
  </select>
</label>

      <label>상태
        <select id="status">
          <option>요청</option>
          <option>확인중</option>
          <option>진행중</option>
          <option>피드백대기</option>
          <option>수정중</option>
          <option>지연</option>
          <option>완료</option>
          <option>보류</option>
        </select>
      </label>

    </div>

    <label class="full-label">
      관리자 상세 요청사항
      <textarea id="detail" placeholder="사이즈, 용도, 문구, 참고자료, 납품형태, 마감시간 등을 상세히 입력하세요."></textarea>
    </label>

    <label class="full-label">
      지연사유
      <textarea id="delayReason" placeholder="기한 내 처리하지 못할 경우 지연사유를 입력하세요."></textarea>
    </label>

    <label class="full-label">
      디자인팀 피드백
      <textarea id="feedback" placeholder="디자인팀 의견, 진행상황, 문의사항 등을 입력하세요."></textarea>
    </label>

    <button class="primary" onclick="saveTask()">디자인 업무 저장</button>

  </section>

  <section id="list" class="panel">

    <h2>진행중 디자인 업무</h2>

    <div class="filter-box">
      <select id="filterStatus" onchange="renderTasks()">
        <option value="">전체상태</option>
        <option>요청</option>
        <option>확인중</option>
        <option>진행중</option>
        <option>피드백대기</option>
        <option>수정중</option>
        <option>지연</option>
        <option>보류</option>
      </select>

      <select id="filterPriority" onchange="renderTasks()">
        <option value="">전체중요도</option>
        <option>긴급</option>
        <option>중요</option>
        <option>보통</option>
      </select>

      <select id="filterStore" onchange="renderTasks()">
        <option value="">전체점포</option>
        <option>한국의집 롯데월드몰점</option>
        <option>고호재 롯데월드몰점</option>
        <option>효종갱 파주프리미엄아울렛점</option>
        <option>압구정 길채정</option>
        <option>평촌 소바공방</option>
        <option>고궁 롯데부여아울렛점</option>
        <option>카페그랑떼</option>
        <option>기타</option>
      </select>

      <button onclick="loadTasks()">새로고침</button>

      <button onclick="applyStatusFilter()">
        상태 조회
      </button>


    </div>

    <div id="taskList" class="task-list"></div>

  </section>

  <section id="done" class="panel">

    <h2>완료된 디자인 업무 조회</h2>

    <div class="form-grid">

      <label>관련 점포
        <select id="doneStore">
          <option value="">전체점포</option>
          <option>한국의집 롯데월드몰점</option>
          <option>고호재 롯데월드몰점</option>
          <option>효종갱 파주프리미엄아울렛점</option>
          <option>압구정 길채정</option>
          <option>평촌 소바공방</option>
          <option>고궁 롯데부여아울렛점</option>
          <option>카페그랑떼</option>
          <option>기타</option>
        </select>
      </label>

      <label>시작일
        <input type="date" id="doneStartDate">
      </label>

      <label>종료일
        <input type="date" id="doneEndDate">
      </label>

    </div>

    <button class="primary" onclick="renderDoneTasks()">
      완료 업무 조회
    </button>

    <div id="doneTaskList" class="task-list" style="margin-top:20px;"></div>

  </section>

</main>

<script src="design-task.js"></script>

</body>
</html>
